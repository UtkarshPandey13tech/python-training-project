{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container my-5">
  <div class="row">

    <div class="col-md-6">
      <img src="{{ product.image.url }}" class="img-fluid">
    </div>

    <div class="col-md-6">
      <h2>{{ product.name }}</h2>
      <h4 class="text-danger">₹{{ product.price }}</h4>
      <p>{{ product.description }}</p>

      <button class="btn btn-warning">Add to Cart</button>
    </div>

  </div>
</div>

{% endblock %}
